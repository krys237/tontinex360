version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: tontine_db
    restart: always
    environment:
      POSTGRES_DB: tontine_db
      POSTGRES_USER: tontine
      POSTGRES_PASSWORD: tontine_app_2025
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"

  redis:
    image: redis:7
    container_name: tontine_redis
    restart: always
    ports:
      - "6388:6379"

  backend:
    build: .
    container_name: tontine_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8010:8000"
    environment:
      POSTGRES_DB: tontine_db
      POSTGRES_USER: tontine
      POSTGRES_PASSWORD: tontine_app_2025
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      RUN_MIGRATIONS: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery_worker:
    build: .
    container_name: celery_worker
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery_beat:
    build: .
    container_name: celery_beat
    command: celery -A config beat -l info
    volumes:
      - .:/app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  flower:
    build: .
    container_name: flower
    command: celery -A config flower --port=5555
    ports:
      - "5556:5555"
    volumes:
      - .:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  postgres_data: